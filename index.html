<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ricky Christie Films</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 span {
      display: block;
      font-weight: 700;
      color: #e8c87a;
    }

    p {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #e8c87a;
      margin: 2rem auto;
    }

    .headshot {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #e8c87a;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <main>
    <img class="headshot" src="images/ricky-camera-operator.jpg" alt="Ricky Christie operating a camera on set">
    <h1>Ricky Christie <span>Films</span></h1>
    <div class="divider"></div>
    <p>Coming soon</p>
  </main>
</body>
</html>
